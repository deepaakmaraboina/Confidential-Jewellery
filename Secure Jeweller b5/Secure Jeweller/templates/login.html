{% extends 'base.html' %}

{% block title %}Login - Jewellery Workflow System{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow login-card">
            <div class="card-header bg-warning text-dark text-center">
                <h3><i class="fas fa-sign-in-alt me-2"></i>Login</h3>
            </div>
            <div class="card-body">
                <div class="text-center mb-4">
                    <i class="fas fa-gem fa-4x text-warning"></i>
                </div>
                <form method="POST" action="{{ url_for('login') }}">
                    <div class="mb-3">
                        <label for="email" class="form-label">
                            <i class="fas fa-envelope me-1"></i>Email Address
                        </label>
                        <input type="email" class="form-control" id="email" name="email" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">
                            <i class="fas fa-lock me-1"></i>Password
                        </label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-warning btn-lg">
                            <i class="fas fa-sign-in-alt me-2"></i>Login
                        </button>
                    </div>
                </form>
                <hr>
                <p class="text-center mb-0">
                    Don't have an account?
                    <a href="{{ url_for('signup') }}" class="text-warning">Sign up here</a>
                </p>
                <p class="text-center mb-0 mt-2">
                    <a href="{{ url_for('forgot_password') }}" class="text-muted small">Forgot Password?</a>
                </p>
                <p class="text-center mb-0">
                    <a href="{{ url_for('reset_password') }}" class="text-muted small">Reset Password (Approved
                        Requests)</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
