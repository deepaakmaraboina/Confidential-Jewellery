{% extends 'base.html' %}

{% block title %}Reset Password - Jewellery Workflow System{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow login-card">
            <div class="card-header bg-warning text-dark text-center">
                <h3><i class="fas fa-key me-2"></i>Reset Password</h3>
            </div>
            <div class="card-body">
                <p class="text-center">Enter your email and new password. (Requires Admin Approval)</p>
                <form method="POST" action="{{ url_for('reset_password') }}">
                    <div class="mb-3">
                        <label for="email" class="form-label">
                            <i class="fas fa-envelope me-1"></i>Email Address
                        </label>
                        <input type="email" class="form-control" id="email" name="email" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">
                            <i class="fas fa-lock me-1"></i>New Password
                        </label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-warning">
                            <i class="fas fa-check-circle me-2"></i>Set New Password
                        </button>
                    </div>
                </form>
                <hr>
                <p class="text-center mb-0">
                    <a href="{{ url_for('login') }}" class="text-warning">Back to Login</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
