{% extends 'base.html' %}

{% block title %}Forgot Password - Jewellery Workflow System{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow login-card">
            <div class="card-header bg-warning text-dark text-center">
                <h3><i class="fas fa-question-circle me-2"></i>Forgot Password</h3>
            </div>
            <div class="card-body">
                <p class="text-center">Enter your email address to request a password reset.</p>
                <form method="POST" action="{{ url_for('forgot_password') }}">
                    <div class="mb-3">
                        <label for="email" class="form-label">
                            <i class="fas fa-envelope me-1"></i>Email Address
                        </label>
                        <input type="email" class="form-control" id="email" name="email" required>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-warning">
                            <i class="fas fa-paper-plane me-2"></i>Submit Request
                        </button>
                    </div>
                </form>
                <hr>
                <p class="text-center mb-0">
                    <a href="{{ url_for('login') }}" class="text-warning">Back to Login</a>
                </p>
                <p class="text-center mb-0 mt-2">
                    <a href="{{ url_for('reset_password') }}" class="text-secondary">I have an approved reset request</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
